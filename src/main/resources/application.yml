
spring:
  application:
    name: ServiMatch

  datasource:
    url: jdbc:postgresql://localhost:5432/servimatch_db
    username: servimatch_user
    password: servimatch123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    user:
      name: admin
      password: admin

  modulith:
    events:
      jdbc-schema-initialization:
        enabled: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ThisIsAVerySecureSecretKeyForJWTTokenGenerationPleaseChangeInProduction
  expiration: 86400

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.servimatch: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
